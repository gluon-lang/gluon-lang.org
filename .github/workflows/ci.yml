name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

env:
  RUST_BACKTRACE: "1"

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
      REGISTRY_PASS: ${{ secrets.REGISTRY_PASS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker registry
        if: ${{ env.REGISTRY_PASS != '' }}
        run: echo "$REGISTRY_PASS" | docker login -u "$REGISTRY_USER" --password-stdin

      - name: Pull dependencies image cache
        run: docker pull marwes/try_gluon:dependencies || true

      - name: Pull builder image cache on master
        if: ${{ github.base_ref == 'master' || github.ref_name == 'master' }}
        run: docker pull marwes/try_gluon:builder || true

      - name: Run CI script
        run: ./scripts/ci.sh

      - name: List Docker images
        if: always()
        run: docker images
