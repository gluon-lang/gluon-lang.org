name: CI

on:
  pull_request:
  workflow_dispatch:

env:
  RUST_BACKTRACE: "1"
  CROSS_VERSION: "0.2.5"

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2

      - name: Run CI script
        run: ./scripts/ci.sh
