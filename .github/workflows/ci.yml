name: CI

on:
  pull_request:
  workflow_dispatch:

env:
  RUST_BACKTRACE: "1"
  CROSS_VERSION: "0.2.5"

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      PULL_DOCKER_CACHE: false
      PUSH_DOCKER_CACHE: ${{ secrets.REGISTRY_PASS != '' && '1' || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker registry
        if: ${{ env.PULL_DOCKER_CACHE == '1' || env.PUSH_DOCKER_CACHE == '1' }}
        run: echo "${{ secrets.REGISTRY_PASS }}" | docker login -u "${{ secrets.REGISTRY_USER }}" --password-stdin

      - name: Cache cross binary
        id: cache-cross
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cross
          key: cross-${{ runner.os }}-${{ env.CROSS_VERSION }}

      - name: Install cross
        if: ${{ steps.cache-cross.outputs.cache-hit != 'true' }}
        run: cargo install cross --version "${CROSS_VERSION}" --locked


      - name: Run CI script
        run: ./scripts/ci.sh

      - name: List Docker images
        if: always()
        run: docker images
