name: Deploy

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - master
  workflow_dispatch:

env:
  RUST_BACKTRACE: "1"

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}
    runs-on: ubuntu-latest
    environment: prod
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1
      AWS_REGION: us-east-1
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Cache cargo-lambda
        id: cache-cargo-lambda
        uses: actions/cache@v6
        with:
          path: ~/.cargo/bin/cargo-lambda
          key: cargo-lambda-${{ runner.os }}

      - name: Install cargo-lambda
        if: steps.cache-cargo-lambda.outputs.cache-hit != 'true'
        run: curl -fsSL https://cargo-lambda.info/install.sh | sh

      - name: Cache zig
        id: cache-zig
        uses: actions/cache@v6
        with:
          path: ~/.zig/zig
          key: zig-${{ runner.os }}-0.13.0

      - name: Install zig
        if: steps.cache-zig.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.zig
          curl -fsSL https://ziglang.org/download/0.13.0/zig-linux-x86_64-0.13.0.tar.xz | tar -xJ -C ~/.zig --strip-components=1

      - name: Add zig to PATH
        run: echo "$HOME/.zig" >> $GITHUB_PATH

      - name: Cache mdbook
        id: cache-mdbook
        uses: actions/cache@v6
        with:
          path: ~/.cargo/bin/mdbook
          key: mdbook-${{ runner.os }}-0.5.4

      - name: Install mdbook
        if: steps.cache-mdbook.outputs.cache-hit != 'true'
        run: curl -fsSL https://github.com/rust-lang/mdBook/releases/download/v0.5.4/mdbook-v0.5.4-x86_64-unknown-linux-gnu.tar.gz | tar -xz -C ~/.cargo/bin

      - name: Build Frontend
        run: npm ci && npm run build

      - name: Generate docs
        run: cargo run --release --bin generate_docs --all-features

      - name: Build server
        run: cargo lambda build --bin try_gluon --release --all-features --output-format zip

      - name: Run Terraform deploy
        run: ./scripts/terraform_apply.sh
